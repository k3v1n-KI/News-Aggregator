{% extends "base.html" %}
{% block head %}
    <title>Login</title>
{% endblock %}

{% block body %}
    <h1>Login</h1>
    <p style="color: red;">{{ invalid }}</p>
    <form method="POST">
        <input type="text" class="form-control" placeholder="Username" name="username_login" id="">
        <br>
        <input type="password" class="form-control" placeholder="Password" name="password_login" id="">
        <br>
        <input class="btn btn-success" type="submit" value="Login">
    </form>
    <br>
    <p>Don't have an account? <a href="/register">Register</a></p>
{% endblock %}
